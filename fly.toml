# fly.toml app configuration file generated for vesperlabs on 2024-05-05T15:18:14+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vesperlabs'
primary_region = 'cdg'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
# Node version is defined in Dockerfile (node:22-bookworm)
# These are passed as Docker build ARGs so Vite can bake them into the client bundle at build time.
# Runtime-only [env] values are NOT visible during `docker build`.
#
# Metered TURN: set METERED_APP_NAME to your app subdomain from metered.ca (public).
# Do NOT commit METERED_API_KEY — pass at deploy: `fly deploy --build-arg METERED_API_KEY=...`
# METERED_REGION must match your Metered app (e.g. global, us_east, europe) — see Metered dashboard / docs.
  [build.args]
    ASSETS_URL = 'https://aether.onrender.com/assets'
    SERVER_URL = 'https://vesperlabs.fly.dev'
    SERVER_FPS = '20'
    PEER_CLIENT_PORT = '443'
    DEBUG = 'false'
    METERED_APP_NAME = 'asyndesis'
    METERED_REGION = 'global'

[env]
  ASSETS_URL = 'https://aether.onrender.com/assets'
  DEBUG = 'false'
  GIT_BRANCH = 'main'
  GIT_REPO = 'git@github.com:VesperLabs/aether.git'
  NODE_ENV = 'production'
  PEER_CLIENT_PORT = '443'
  PEER_SERVER_PORT = '9000'
  PORT = '8080'
  PUBLIC_DIR = '../public'
  SERVER_FPS = '20'
  SERVER_URL = 'https://vesperlabs.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  processes = ['app']
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    idle_timeout = 900

  [[http_service.checks]]
    interval = '5s'
    timeout = '2s'
    grace_period = '30s'
    method = 'get'
    path = '/health'
    protocol = 'http' 

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 2